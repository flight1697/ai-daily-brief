name: AI Daily Brief

on:
  schedule:
    - cron: "45 0 * * *" # Primary: 08:45 Asia/Shanghai, avoiding the top-of-hour queue.
    - cron: "15 1 * * *" # Fallback: 09:15; skipped when today's primary run succeeded.
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional target date (YYYY-MM-DD)"
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: ai-daily-brief-delivery
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - name: Check whether today's digest was already delivered
        id: delivery_guard
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        shell: bash
        run: echo "should_send=$(python -m ai_daily_brief.schedule_guard)" >> "$GITHUB_OUTPUT"
      - name: Generate and send digest
        if: steps.delivery_guard.outputs.should_send == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.target_date }}" ]; then DATE_ARG="--date ${{ inputs.target_date }}"; fi
          python -m ai_daily_brief $DATE_ARG --send --output data/latest.html
      - name: Upload generated digest
        if: always() && steps.delivery_guard.outputs.should_send == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-brief-${{ github.run_id }}
          path: |
            data/latest.html
            data/ai_daily.db
          if-no-files-found: ignore
          retention-days: 30
