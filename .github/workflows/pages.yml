name: AI Daily Brief Status Dashboard

on:
  schedule:
    - cron: "0 3 * * *" # 11:00 Asia/Shanghai, after delivery health checks.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - name: Generate anonymous dashboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m ai_daily_brief.dashboard --days 30 --output public/index.html
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
