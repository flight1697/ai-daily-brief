name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          python -m pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: python -m pytest --cov=ai_daily_brief --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade "pip>=26.1.2" build
          python -m build
      - name: Verify wheel installation and command entry points
        run: |
          python -m pip install dist/*.whl
          ai-daily-brief --help
          ai-daily-health --help
          ai-daily-weekly --help
          ai-daily-dashboard --help
      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ github.run_id }}
          path: dist/*
          retention-days: 14

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Audit installed runtime dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2" pip-audit
          python -m pip install .
          python -m pip_audit --local
